<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Training Programs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    /* Banner */
    .banner {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 5px;
      padding: 5px;
      background: #000;
    }

    .banner img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    /* Heading */
    .main-title {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      color: #333;
    }

    /* Cards */
    .courses {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .course-card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      text-decoration: none;
      color: #333;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .course-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    }

    .course-card h2 {
      font-size: 20px;
      margin: 0;
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .banner img {
        height: 120px;
      }

      .main-title {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <!-- Banner Collage -->
  <div class="banner">
    <img src="https://source.unsplash.com/600x400/?yoga" alt="Yoga">
    <img src="https://source.unsplash.com/600x400/?meditation" alt="Meditation">
    <img src="https://source.unsplash.com/600x400/?prenatal-yoga" alt="Pregnancy Yoga">
    <img src="https://source.unsplash.com/600x400/?aerial-yoga" alt="Aerial Yoga">
  </div>

  <!-- Title -->
  <div class="main-title">
    Teacher Training Programs
  </div>

  <!-- Course Links -->
  <div class="courses">

    <a href="https://app.globalschoolofyoga.com/yoga-instructor-training.html" class="course-card">
      <h2>Yoga Instructor Training</h2>
    </a>

    <a href="https://app.globalschoolofyoga.com/international-teacher-training.html" class="course-card">
      <h2>Yoga International Teacher Training</h2>
    </a>

    <a href="https://app.globalschoolofyoga.com/pregnancy-yoga-teacher-training.html" class="course-card">
      <h2>Pregnancy Yoga Teacher Training</h2>
    </a>

    <a href="https://app.globalschoolofyoga.com/aerial-yoga-teacher-training.html" class="course-card">
      <h2>Aerial Yoga Teacher Training</h2>
    </a>

  </div>

</body>
</html>
