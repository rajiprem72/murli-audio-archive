<!DOCTYPE html>
<html>
<head>
  <title>Raja Yoga GIST and Manifestation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      margin: 0;
      padding: 0;
    }

    #player {
      width: 100%;
      height: 300px;
    }

    .playlist {
      padding: 10px;
    }

    .video-item {
      padding: 10px;
      border-bottom: 1px solid #333;
      cursor: pointer;
    }

    .video-item:hover {
      background: #222;
    }

    .active {
      background: #333;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div id="player"></div>
  <div class="playlist" id="playlist"></div>

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>

    const JSON_URL = "https://raw.githubusercontent.com/rajiprem72/murli-audio-archive/main/gist_manifestation.json";

    let player;
    let videoIds = [];
    let currentIndex = 0;

    // Load JSON
    fetch(JSON_URL)
      .then(response => response.json())
      .then(data => {
        videoIds = data.videos;
        createPlaylist();
        loadYouTubePlayer();
      });

    function loadYouTubePlayer() {
      window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('player', {
          height: '300',
          width: '100%',
          videoId: videoIds[0].id, // first video auto play
          playerVars: {
            autoplay: 1,
            rel: 0
          }
        });
      };
    }

  function createPlaylist() {
  const playlistDiv = document.getElementById("playlist");
  playlistDiv.innerHTML = "";

  videoIds.forEach((video, index) => {

    const div = document.createElement("div");
    div.className = "video-item";

    div.innerHTML = `
      <img src="${video.thumbnail}" width="120" style="vertical-align:middle;">
      <span style="margin-left:10px;">${video.title}</span>
    `;

    div.onclick = () => loadVideo(index);

    playlistDiv.appendChild(div);
  });

  highlightActive();
}

    function loadVideo(index) {
      if (!playerReady) return;

      currentIndex = index;
      player.loadVideoById(videoIds[index].id);
      highlightActive();
      }
    
    function highlightActive() {
      const items = document.querySelectorAll(".video-item");
      items.forEach((item, i) => {
        item.classList.toggle("active", i === currentIndex);
      });
    }

  </script>

</body>
</html>
