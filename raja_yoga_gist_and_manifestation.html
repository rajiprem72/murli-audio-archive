<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Raja Yoga Playlist</title>
<style>
body {
  margin: 0;
  background: #000;
}
iframe {
  width: 100%;
  height: 90vh;
  border: none;
}
</style>
</head>
<body>

<iframe
  src="https://www.youtube.com/embed/videoseries?list=PLejqAWAjVfCT4HENHmsdb4jHGdtj3D5EP&rel=0"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>
<script>
  const apiKey = "AIzaSyDiFQhzkFVdYOz4NNcLiOGu--u6Lh2Mvj";
  const channelId = "YOUR_CHANNEL_ID_HERE";

  async function loadLatestVideo() {
    const url = `https://www.googleapis.com/youtube/v3/search?key=${apiKey}&channelId=${channelId}&part=snippet&order=date&maxResults=1&type=video`;

    const response = await fetch(url);
    const data = await response.json();

    if (data.items && data.items.length > 0) {
      const videoId = data.items[0].id.videoId;
      document.getElementById("youtubePlayer").src =
        `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1`;
    }
  }

  loadLatestVideo();
</script>
</body>
</html>
