<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Latest YouTube Video</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .video-container {
      position: relative;
      width: 90%;
      max-width: 900px;
      padding-bottom: 56.25%; /* 16:9 ratio */
      height: 0;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div class="video-container">
  <iframe
  width="100%"
  height="500"
  src="https://www.youtube.com/embed/videoseries?list=PLejqAWAjVfCT4HENHmsdb4jHGdtj3D5EP"
  frameborder="0"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
  allowfullscreen>
</iframe>
  
</div>
<script>
  async function loadLatestVideo() {

    const channelId = "UCUdlewvf5aiwwG5AQ2v3Y0Q";
    const rssUrl = `https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;

    try {
      const response = await fetch(rssUrl);
      const data = await response.json();

      if (data.items && data.items.length > 0) {
        const videoLink = data.items[0].link;
        const videoId = videoLink.split("v=")[1];

        document.getElementById("youtubePlayer").src =
          `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1`;
      }

    } catch (error) {
      console.error("Error loading video:", error);
    }
  }

  loadLatestVideo();
</script>
</body>
</html>
