<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Raja Yoga Gist & Manifestation - Tamil</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f8;
        color: #222;
    }

    h1 {
        text-align: center;
        padding: 20px;
        margin: 0;
        background: #4e46e5;
        color: #fff;
        font-size: 26px;
        letter-spacing: 0.5px;
    }

    #loadingMessage {
        text-align: center;
        padding: 12px;
        font-size: 17px;
        background: #fff3cd;
        color: #856404;
        border: 1px solid #ffeeba;
        border-radius: 8px;
        max-width: 900px;
        margin: 15px auto;
        display: none;
    }

    #player-container {
        max-width: 900px;
        margin: 20px auto;
        background: #000;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    iframe {
        width: 100%;
        height: 500px;
    }

    .playlist-container {
        max-width: 900px;
        margin: 20px auto;
        padding: 10px;
    }

    .video-card {
        display: flex;
        background: #fff;
        border-radius: 10px;
        margin-bottom: 18px;
        overflow: hidden;
        box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .video-card:hover {
        transform: scale(1.01);
        box-shadow: 0 4px 10px rgba(0,0,0,0.20);
    }

    .video-thumb {
        width: 40%;
        min-height: 140px;
        background-size: cover;
        background-position: center;
    }

    .video-info {
        width: 60%;
        padding: 15px;
    }

    .video-info h3 {
        margin: 0 0 8px;
        font-size: 18px;
        color: #222;
    }

    .video-info p {
        margin: 0;
        color: #444;
        font-size: 14px;
    }

    @media(max-width: 700px) {
        .video-card {
            flex-direction: column;
        }
        .video-thumb, .video-info {
            width: 100%;
        }
        iframe {
            height: 260px;
        }
    }
</style>

</head>
<body>

<h1>Raja Yoga Gist & Manifestation - Tamil</h1>

<div id="loadingMessage">⏳ Playlist is loading, please wait…</div>

<div id="player-container">
  <iframe id="player" src="" frameborder="0" allowfullscreen allow="autoplay"></iframe>
</div>

<div class="playlist-container" id="playlist"></div>
<script>
const playlistId = "PLejqAWAjVfCT4HENHmsdb4jHGdtj3D5EP";

const youtubeFeed = `https://www.youtube.com/feeds/videos.xml?playlist_id=${playlistId}`;
const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(youtubeFeed);

document.getElementById("loadingMessage").style.display = "block";

fetch(proxyUrl)
  .then(response => {
      if (!response.ok) {
          throw new Error("Network response was not ok");
      }
      return response.text();
  })
  .then(xmlText => {

      const xml = new DOMParser().parseFromString(xmlText, "text/xml");
      const entries = Array.from(xml.getElementsByTagName("entry"));

      if (entries.length === 0) {
          throw new Error("Playlist empty or private.");
      }

      // 🔥 NEWEST FIRST
      entries.sort((a, b) =>
          new Date(b.getElementsByTagName("published")[0].textContent) -
          new Date(a.getElementsByTagName("published")[0].textContent)
      );

      const container = document.getElementById("playlist");

      const firstId = entries[0]
          .getElementsByTagName("link")[0]
          .getAttribute("href")
          .split("v=")[1];

      document.getElementById("player").src =
        "https://www.youtube-nocookie.com/embed/" + firstId + "?rel=0";

      entries.forEach(entry => {

          const title = entry.getElementsByTagName("title")[0].textContent;
          const link = entry.getElementsByTagName("link")[0].getAttribute("href");
          const videoId = link.split("v=")[1];

          const card = document.createElement("div");
          card.className = "video-card";
          card.innerHTML = `<h3>${title}</h3>`;

          card.onclick = () => {
              document.getElementById("player").src =
                "https://www.youtube-nocookie.com/embed/" + videoId + "?rel=0";
          };

          container.appendChild(card);
      });

      document.getElementById("loadingMessage").style.display = "none";
  })
  .catch(err => {
      document.getElementById("loadingMessage").innerText =
          "❌ Unable to load playlist. Try refreshing.";
      console.error(err);
  });
</script>
</body>
</html>
