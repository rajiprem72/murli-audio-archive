<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raja Yoga 7 Days Course</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    text-align: center;
}

header {
    background: #6a1b9a;
    color: white;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
}

.language-buttons {
    padding: 10px;
    background: white;
}

.language-buttons button {
    padding: 8px 15px;
    margin: 5px;
    border: none;
    border-radius: 20px;
    background: #e0e0e0;
    cursor: pointer;
    font-weight: bold;
}

.language-buttons button.active {
    background: #6a1b9a;
    color: white;
}

.course-section {
    display: none;
}

.carousel {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 15px;
}

.carousel img {
    width: 140px;   /* Small thumbnail size */
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.3s;
}

.carousel img:hover {
    transform: scale(1.05);
}

/* Fullscreen Viewer */
.fullscreen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.fullscreen img {
    max-width: 95%;
    max-height: 95%;
}

.close-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 28px;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<header>Raja Yoga 7 Days Course</header>

<div class="language-buttons">
    <button onclick="showSection('tamil', this)" class="active">Tamil</button>
    <button onclick="showSection('hindi', this)">Hindi</button>
    <button onclick="showSection('english', this)">English</button>
</div>

<!-- Tamil -->
<div id="tamil" class="course-section" style="display:block;">
    <h2>Tamil</h2>
    <div class="carousel" id="carousel-tamil"></div>
</div>

<!-- Hindi -->
<div id="hindi" class="course-section">
    <h2>Hindi</h2>
    <div class="carousel" id="carousel-hindi"></div>
</div>

<!-- English -->
<div id="english" class="course-section">
    <h2>English</h2>
    <div class="carousel" id="carousel-english"></div>
</div>

<!-- Fullscreen Viewer -->
<div class="fullscreen" id="fullscreenViewer" onclick="closeFullscreen()">
    <span class="close-btn">&times;</span>
    <img id="fullscreenImage">
</div>

<script>

// === CONFIG: Set image count per language ===
const courses = {
    tamil: { folder: "7_days_course_tamil", total: 28 },
    hindi: { folder: "7_days_course_hindi", total: 23 },
    english: { folder: "7_days_course_english", total: 18 }
};

// Load images dynamically
function loadImages(language) {
    const config = courses[language];
    const carousel = document.getElementById("carousel-" + language);
    
    if (carousel.children.length > 0) return;

    for (let i = 1; i <= config.total; i++) {
        const img = document.createElement("img");
        img.src = "./" + config.folder + "/" + i + ".jpg";
        img.alt = language + " Page " + i;
        img.onclick = function() {
            openFullscreen(this.src);
        };
        carousel.appendChild(img);
    }
}

// Show section
function showSection(language, button) {
    document.querySelectorAll(".course-section").forEach(sec => sec.style.display = "none");
    document.getElementById(language).style.display = "block";

    document.querySelectorAll(".language-buttons button").forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");

    loadImages(language);
}

// Fullscreen open
function openFullscreen(src) {
    const viewer = document.getElementById("fullscreenViewer");
    const img = document.getElementById("fullscreenImage");
    img.src = src;
    viewer.style.display = "flex";
}

// Fullscreen close
function closeFullscreen() {
    document.getElementById("fullscreenViewer").style.display = "none";
}

// Load Tamil by default
loadImages("tamil");

</script>

</body>
</html>
